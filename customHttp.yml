customHeaders:
  - pattern: '**/*'
    headers:
      - key: Strict-Transport-Security
        value: 'max-age=31536000; includeSubDomains; preload'
      - key: X-Content-Type-Options
        value: 'nosniff'
      - key: X-Frame-Options
        value: 'SAMEORIGIN'
      - key: X-XSS-Protection
        value: '1; mode=block'
      - key: Referrer-Policy
        value: 'strict-origin-when-cross-origin'
      - key: Permissions-Policy
        value: 'camera=(), microphone=(), geolocation=(self), payment=(self)'
      - key: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://tenantbilling-assets-382334305159.s3.eu-north-1.amazonaws.com data:; font-src 'self'; connect-src 'self' https://7zkpyvvrql.execute-api.eu-north-1.amazonaws.com https://cognito-idp.eu-north-1.amazonaws.com; frame-ancestors 'self'"
  - pattern: '/sitemap.xml'
    headers:
      - key: Content-Type
        value: 'application/xml'
      - key: Cache-Control
        value: 'public, max-age=86400'
  - pattern: '/robots.txt'
    headers:
      - key: Content-Type
        value: 'text/plain'
      - key: Cache-Control
        value: 'public, max-age=86400'
  - pattern: '*.js'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '*.css'
    headers:
      - key: Cache-Control
        value: 'public, max-age=31536000, immutable'
  - pattern: '*.png'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000'
  - pattern: '*.jpg'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000'
  - pattern: '*.webp'
    headers:
      - key: Cache-Control
        value: 'public, max-age=2592000'
